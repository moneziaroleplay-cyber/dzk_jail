<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* RESET & BASE */
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            display: none; 
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        #admin-wrapper {
            width: 900px;
            height: 550px;
            background: #1a1a24;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease-in-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* HEADER */
        .header {
            padding: 15px 20px;
            background: #111;
            border-bottom: 2px solid #3b82f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header span {
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 20px;
            text-transform: uppercase;
        }

        .header-btns {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .histo-btn {
            color: #3b82f6;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.2s;
        }

        .histo-btn:hover { color: white; }

        .close-btn {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            padding: 5px 10px;
            border: 1px solid #ef4444;
            border-radius: 5px;
            transition: 0.2s;
        }

        .close-btn:hover { background: #ef4444; color: white; }

        /* CONTENU PRINCIPAL */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left {
            width: 35%;
            padding: 25px;
            border-right: 1px solid #333;
            background: #1e1e2a;
        }

        .right {
            width: 65%;
            padding: 20px;
            overflow-y: auto;
            background: #14141c;
        }

        h3 {
            margin-top: 0;
            color: #3b82f6;
            font-size: 16px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 11px;
            color: #888;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            background: #262635;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: #3b82f6; }

        button {
            width: 100%;
            padding: 15px;
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover { background: #2563eb; }

        /* CARTES DE JAIL ACTIFS */
        .player-card {
            background: #1e1e2a;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .unjail-btn-small {
            background: #ef4444;
            padding: 5px 10px;
            width: auto;
            font-size: 10px;
            margin: 0;
            border-radius: 4px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .unjail-btn-small:hover { background: #b91c1c; }

        /* FENÊTRE HISTORIQUE */
        #history-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #14141c;
            z-index: 10;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .history-item {
            background: #1e1e2a;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid #3b82f6;
            border-radius: 4px;
        }

        .history-title {
            color: #3b82f6;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .history-text { font-size: 14px; line-height: 1.4; }
        .hl-staff { color: #facc15; font-weight: bold; }
        .hl-target { color: #ef4444; font-weight: bold; }
        
        .history-footer { 
            margin-top: 10px; font-size: 11px; color: #888; 
            display: flex; justify-content: space-between;
            border-top: 1px solid #333; padding-top: 5px;
        }

    </style>
</head>
<body>

    <div id="admin-wrapper">
        <div class="header">
            <span>Panel Administration Jail</span>
            <div class="header-btns">
                <div class="histo-btn" onclick="openHistory()">Historique Jail</div>
                <div class="close-btn" onclick="closeMenu()">FERMER</div>
            </div>
        </div>

        <div id="history-modal">
            <div class="header">
                <span>Historique des Sanctions</span>
                <div class="close-btn" onclick="closeHistory()">RETOUR</div>
            </div>
            <div id="history-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
        </div>

        <div class="main">
            <div class="left">
                <h3>Ajouter un Jail</h3>
                
                <label>ID DU JOUEUR</label>
                <input type="text" id="target-id" placeholder="Ex: 1">
                
                <label>TEMPS (MINUTES)</label>
                <input type="text" id="jail-duration" placeholder="Ex: 15">
                
                <label>RAISON DU JAIL</label>
                <textarea id="jail-reason" rows="4" placeholder="Indiquez la raison..."></textarea>
                
                <button onclick="submitJail()">Valider le Jail</button>
            </div>
            
            <div class="right">
                <h3>Jails en cours</h3>
                <div id="player-list"></div>
            </div>
        </div>
    </div>

    <audio id="prison_alarm" src="sounds/prison_alarm.mp3"></audio>
    <audio id="prison_voice" src="sounds/prison_voice.mp3"></audio>

    <script>
        window.addEventListener('message', function(event) {
            let data = event.data;

            if (data.action === "openPanel") {
                document.body.style.display = "flex";
                const list = document.getElementById('player-list');
                list.innerHTML = "";
                
                if (data.jailedList && data.jailedList.length > 0) {
                    data.jailedList.forEach(p => {
                        let estSorti = (p.status === "released");
                        let couleurStatus = estSorti ? "#4ade80" : "#ef4444";
                        let texteStatus = estSorti ? "• JOUEUR DÉJÀ SORTI" : "• ACTUELLEMENT EN JAIL";
                        
                        list.innerHTML += `
                            <div class="player-card" style="border-left: 5px solid ${couleurStatus};">
                                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                    <span style="font-weight:bold; color:#3b82f6;">${p.name}</span>
                                    <span style="background:#3b82f6; padding:2px 8px; border-radius:4px; font-size:11px;">ID: ${p.id}</span>
                                </div>
                                <div style="font-size:13px; margin-bottom:10px; background:rgba(0,0,0,0.2); padding:8px; border-radius:4px;">
                                    <b>Raison :</b> ${p.reason}
                                </div>
                                <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px; color:#aaa; border-top:1px solid #333; padding-top:8px;">
                                    <div>
                                        Par : <span style="color:#facc15; font-weight:bold;">${p.staffName || 'Inconnu'}</span> (${p.time} min)
                                        <span style="color:${couleurStatus}; font-weight:bold; margin-left:8px; text-transform:uppercase;">${texteStatus}</span>
                                    </div>
                                    <button class="unjail-btn-small" onclick="requestUnjail(${p.id})">LIBÉRER</button>
                                </div>
                            </div>`;
                    });
                } else {
                    list.innerHTML = "<p style='color:#555; text-align:center; margin-top:50px;'>Aucun jail actif.</p>";
                }
            }

            if (data.action === "updateHistory") {
                const histList = document.getElementById('history-list');
                histList.innerHTML = "";
                
                if (data.history && data.history.length > 0) {
                    data.history.slice().reverse().forEach(log => {
                        let typeColor = "#3b82f6"; 
                        let icon = "⚖️";
                        let actionText = `<span class="hl-staff">@${log.staffName}</span> a jail <span class="hl-target">${log.targetName} (ID: ${log.targetId})</span> pour <span style="font-style:italic; color:#fff;">${log.reason}</span>`;

                        if (log.type === "UNJAIL") {
                            typeColor = "#facc15"; 
                            icon = "🔓";
                            actionText = `<span class="hl-staff">@${log.staffName}</span> a <span style="color:#facc15; font-weight:bold;">LIBÉRÉ</span> <span class="hl-target">${log.targetName} (ID: ${log.targetId})</span>`;
                        } else if (log.type === "FINI") {
                            typeColor = "#4ade80"; 
                            icon = "✅";
                            actionText = `<span class="hl-target">${log.targetName} (ID: ${log.targetId})</span> est <span style="color:#4ade80; font-weight:bold;">SORTI AUTOMATIQUEMENT</span> (Temps fini)`;
                        }

                        histList.innerHTML += `
                            <div class="history-item" style="border-left: 5px solid ${typeColor};">
                                <div class="history-title" style="color:${typeColor}">${icon} ${log.type === 'JAIL' ? 'Sanction' : (log.type === 'UNJAIL' ? 'Libération Staff' : 'Libération Auto')}</div>
                                <div class="history-text">${actionText}</div>
                                <div class="history-footer">
                                    <span>${log.type === 'JAIL' ? 'Durée : ' + log.duration + ' min' : 'Action terminée'}</span>
                                    <span>${log.date}</span>
                                </div>
                            </div>`;
                    });
                } else {
                    histList.innerHTML = "<p style='color:#555; text-align:center; margin-top:50px;'>L'historique est vide.</p>";
                }
            }

            if (data.action === "playSound") {
                const audio = document.getElementById(data.sound);
                if (audio) { audio.currentTime = 0; audio.play(); }
            }
        });

        function openHistory() {
            document.getElementById('history-modal').style.display = "flex";
            fetch(`https://${GetParentResourceName()}/getHistory`, { method: 'POST' });
        }

        function closeHistory() {
            document.getElementById('history-modal').style.display = "none";
        }

        function requestUnjail(targetId) {
            fetch(`https://${GetParentResourceName()}/requestUnjail`, {
                method: 'POST',
                body: JSON.stringify({ id: targetId })
            });
        }

        function submitJail() {
            const id = document.getElementById('target-id').value;
            const time = document.getElementById('jail-duration').value;
            const reason = document.getElementById('jail-reason').value;
            
            if (id && time && reason) {
                fetch(`https://${GetParentResourceName()}/validateJail`, {
                    method: 'POST',
                    body: JSON.stringify({ id: id, time: time, reason: reason })
                });
                
                document.getElementById('target-id').value = "";
                document.getElementById('jail-duration').value = "";
                document.getElementById('jail-reason').value = "";
                closeMenu();
            }
        }

        function closeMenu() {
            document.body.style.display = "none";
            closeHistory();
            fetch(`https://${GetParentResourceName()}/close`, { method: 'POST' });
        }

        window.onkeyup = function (data) {
            if (data.key === "Escape") { closeMenu(); }
        };
    </script>
</body>
</html>
